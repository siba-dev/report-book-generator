[versions]
kotlin = "2.2.0"
docx4j = "11.5.5"
slf4j = "2.0.9"
kotlinx-json = "1.9.0"
kotlinx-datetime = "0.7.1"
clikt = "5.1.0"

[libraries]
docx4j-core = { module = "org.docx4j:docx4j-core", version.ref = "docx4j" }
docx4j-jaxb = { module = "org.docx4j:docx4j-JAXB-ReferenceImpl", version.ref = "docx4j" }
slf4j = { module = "org.slf4j:slf4j-simple", version.ref = "slf4j" }
kotlinx-json = { module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version.ref = "kotlinx-json" }
kotlinx-datetime = { module = "org.jetbrains.kotlinx:kotlinx-datetime", version.ref = "kotlinx-datetime" }
clikt = { module = "com.github.ajalt.clikt:clikt", version.ref = "clikt" }